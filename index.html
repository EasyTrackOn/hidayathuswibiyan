<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrassa Result Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fail-row { background-color: #fef2f2 !important; } 
        .marks-font { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <main class="max-w-2xl mx-auto py-10 px-4">
        
        <div id="searchSession" class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-100">
            <div class="text-center mb-8">
                <img id="loginLogo" src="logo2.png" alt="Madrassa Emblem" class="mx-auto h-20 sm:h-24 mb-6"> 
                <h1 class="text-2xl sm:text-3xl font-extrabold text-emerald-800 tracking-tight uppercase">مدرسة هداية الصبيان</h1>
                <h1 class="text-2Ml sm:text-3xl font-extrabold text-emerald-800 tracking-tight uppercase">HIDAYATHU SWIBIYAN MADRASSA</h1>
                <p class="text-xs sm:text-sm text-gray-500">PATTERNADAKKAVU</p>
                <p class="text-xs sm:text-sm text-gray-500">ANANTHAVOOR PO,THIRUNAVAYA,MALAPPURAM</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1 ml-1">Sl No.</label>
                    <input type="text" id="adNo" placeholder="Enter Sl No." class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-emerald-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1 ml-1">Select Class</label>
                    <select id="className" class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-emerald-500 outline-none cursor-pointer">
                        <option value="1">Class 1</option>
                        <option value="2">Class 2</option>
                        <option value="3">Class 3</option>
                        <option value="4">Class 4</option>
                        <option value="5">Class 5</option>
                    </select>
                </div>
                <button onclick="fetchResult()" id="searchBtn" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-700 active:scale-[0.98] transition-all shadow-lg uppercase">
                    View Student Record
                </button>
            </div>
        </div>

        <div id="resultWrapper" class="hidden animate-in fade-in duration-500">
            <div id="resultCard" class="bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-100">
                
                <div class="bg-emerald-800 text-white p-6 text-center">
                <img id="loginLogo" src="logo2.png" alt="Madrassa Emblem" class="mx-auto h-20 sm:h-24 mb-6"> 
                <h1 class="text-2xl sm:text-3xl font-extrabold text-emerald-800 text-white uppercase">مدرسة هداية الصبيان</h1>
                <h1 class="text-2Ml sm:text-3xl font-extrabold text-emerald-800 text-white uppercase">HIDAYATHU SWIBIYAN MADRASSA</h1>
                <p class="text-xs sm:text-sm text-white-500">PATTERNADAKKAVU</p>
                <p class="text-xs sm:text-sm text-white-500">ANANTHAVOOR PO,THIRUNAVAYA,MALAPPURAM</p>
            </div>

                <div class="p-6 sm:p-10">
                    <div class="mb-8">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-gray-400 uppercase text-[10px] tracking-widest font-bold mb-1">Student Name</p>
                                <p id="resName" class="font-black text-gray-900 text-1xl sm:text-xl leading-tight uppercase"></p>
                            </div>
                            <div id="statusBadgeTop" class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter"></div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 py-4 px-5 bg-slate-50 rounded-2xl border border-slate-100">
                            <div>
                                <p class="text-gray-400 uppercase text-[9px] font-bold">Sl No</p>
                                <p id="resAdNo" class="font-bold text-gray-800 text-sm"></p>
                            </div>
                            <div class="text-center border-x border-slate-200">
                                <p class="text-gray-400 uppercase text-[9px] font-bold">Class</p>
                                <p class="font-bold text-gray-800 text-sm"><span id="resClass"></span></p>
                            </div>
                            <div id="rankContainer" class="text-right">
                                <p class="text-gray-400 uppercase text-[9px] font-bold">Class Rank</p>
                                <p id="resRankValue" class="font-bold text-gray-800 text-sm"></p>
                            </div>
                        </div>
                    </div>

                    <div id="marksContainer" class="relative overflow-hidden">
                        <table class="w-full text-left marks-font border-separate border-spacing-y-2">
                            <thead id="tableHead">
                                <tr class="text-[10px] uppercase tracking-widest text-gray-400">
                                    <th class="pb-2 px-2">#</th>
                                    <th class="pb-2">Subject</th>
                                    <th class="pb-2 text-center">Max</th>
                                    <th class="pb-2 text-right px-2">Score</th>
                                </tr>
                            </thead>
                            <tbody id="marksTableBody" class="text-sm text-gray-700">
                                </tbody>
                        </table>
                    </div>

                    <div class="mt-8 pt-6 border-t border-gray-100">
                        <div class="flex items-end justify-between">
                            <div>
                                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Status</p>
                                <p id="resStatusText" class="font-black text-lg sm:text-xl leading-none italic uppercase"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 mt-8 no-print">
                <button onclick="window.location.reload()" class="flex-1 bg-slate-200 text-slate-700 py-4 rounded-xl font-bold hover:bg-slate-300 transition uppercase text-sm">Back to Search</button>
                <button onclick="downloadImage()" class="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-100 transition uppercase text-sm">Download PNG</button>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_krplMQiFJH9IqNndstJTf0hU8iCUmrz1i75Lrd9AGWpuaOIQ-INugoBRY4v3S1S6/exec";
        const sheetId = "1vAlULhvfWd1KBin0MynJMVKgJb9kr4aoJcCgYldhrFs";

        async function fetchResult() {
            const adNo = document.getElementById('adNo').value;
            const className = document.getElementById('className').value;
            const btn = document.getElementById('searchBtn');

            if(!adNo) return alert("Please enter Serial Number");

            btn.disabled = true;
            btn.innerHTML = `<span class="inline-block animate-pulse">SEARCHING RECORDS...</span>`;

            try {
                const response = await fetch(`${SCRIPT_URL}?sheetid=${sheetId}&adno=${adNo}&className=${className}`);
                const data = await response.json();

                if(data.error) {
                    alert(data.error);
                    btn.disabled = false;
                    btn.innerText = "VIEW STUDENT RECORD";
                } else {
                    document.getElementById('searchSession').classList.add('hidden');
                    displayResult(data, className);
                }
            } catch (err) {
                alert("Connection failed. Please check internet.");
                btn.disabled = false;
                btn.innerText = "VIEW STUDENT RECORD";
            }
        }

        function displayResult(data, className) {
            document.getElementById('resultWrapper').classList.remove('hidden');
            
            // Basic Info
            document.getElementById('resName').innerText = (data.details.Name || "Unknown");
            document.getElementById('resAdNo').innerText = data.details.AdNo || "---";
            document.getElementById('resClass').innerText = className;

            const status = (data.details.status || "").toLowerCase();
            const isPassed = data.isPassed;
            const tableBody = document.getElementById('marksTableBody');
            const tableHead = document.getElementById('tableHead');
            const rankContainer = document.getElementById('rankContainer');
            const statusText = document.getElementById('resStatusText');
            const statusBadgeTop = document.getElementById('statusBadgeTop');

            tableBody.innerHTML = ""; 

            if(status === "promoted") {
                // Handle Promoted Status
                rankContainer.classList.add('hidden');
                tableHead.classList.add('hidden');
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="py-12 text-center">
                            <div class="bg-emerald-50 rounded-2xl p-6 border border-emerald-100">
                                <p class="text-emerald-800 font-bold text-lg mb-1 italic">Promotion Pass</p>
                                <p class="text-emerald-600/70 text-xs">The student has been promoted to the next class.</p>
                            </div>
                        </td>
                    </tr>`;
                
                statusText.innerText = "Promotion Pass";
                statusText.className = "font-black text-xl text-emerald-600";
                
                statusBadgeTop.innerText = "Promoted";
                statusBadgeTop.className = "px-3 py-1 rounded-full text-[10px] font-black uppercase bg-emerald-100 text-emerald-700";
                
            } else {
                // Handle Normal Result (Pass/Fail)
                rankContainer.classList.remove('hidden');
                tableHead.classList.remove('hidden');
                
                // Rank
                document.getElementById('resRankValue').innerText = data.details.Rank ? "#" + data.details.Rank : "Nil";

                // Populate Table
                data.marks.forEach((m, index) => {
                    const isSubFailed = m.status !== 'Pass';
                    const rowClass = isSubFailed ? 'fail-row' : '';
                    const scoreClass = isSubFailed ? 'text-red-600 font-black' : 'text-gray-800 font-bold';

                    tableBody.innerHTML += `
                        <tr class="border-b border-gray-950 ${rowClass}">
                            <td class="py-1 px-2 text-[10px] text-gray-400">${index + 1}</td>
                            <td class="py-1 font-bold ">${m.subject}</td>
                            <td class="py-1 text-center text-xs">${m.max || '100'}</td>
                            <td class="py-1 text-right ${scoreClass}">${m.score}</td>
                        </tr>`;
                });

                statusText.innerText = isPassed ? "PASSED" : "FAILED";
                statusText.className = isPassed ? "font-black text-xl text-emerald-600" : "font-black text-xl text-red-600";
                
                statusBadgeTop.innerText = isPassed ? "Passed" : "Failed";
                statusBadgeTop.className = isPassed 
                    ? "px-3 py-1 rounded-full text-[10px] font-black uppercase bg-emerald-100 text-emerald-700" 
                    : "px-3 py-1 rounded-full text-[10px] font-black uppercase bg-red-100 text-red-700";
            }
        }

        function downloadImage() {
            const card = document.querySelector("#resultCard");
            const btn = event.target;
            btn.innerText = "GENERATING...";
            
            html2canvas(card, {
                scale: 3, 
                useCORS: true,
                backgroundColor: "#ffffff",
            }).then(canvas => {
                const adNo = document.getElementById('resAdNo').innerText;
                const link = document.createElement('a');
                link.download = `Result_${adNo}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
                btn.innerText = "DOWNLOAD PNG";
            });
        }
    </script>
</body>
</html>
